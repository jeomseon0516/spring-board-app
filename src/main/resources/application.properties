# 기본설정, 버전은 build.gradle 파일 version 참조
spring.application.name=spring-board-app
spring.application.version=${version}

server.servlet.context-path=/

# DataSource(커넥션풀) 설정
spring.datasource.url=jdbc:mysql://13.125.160.140:3306/board
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=board
spring.datasource.password=1234

# 타임리프 템플릿 경로 설정
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Mybatis 설정
mybatis.mapper-locations=classpath:mappers/**/*.xml

# JPA 설정
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# LOG 설정
logging.level.root=info
logging.file.name=/logs/spring-board-app.log